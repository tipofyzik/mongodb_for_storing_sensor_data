version: "3.8"

services:

  mongodb:
    image: mongo:7
    container_name: mongodb_sensors

    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db
      - ./init.js:/docker-entrypoint-initdb.d/init.js:ro

  app:
    build: .
    image: iot-sensor-loader:1.0
    container_name: sensor_loader

    depends_on:
      - mongodb

    volumes:
      - ./data:/app/data

    command: python main.py

volumes:
  mongo_data: